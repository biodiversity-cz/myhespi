<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myHESPI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h3 mb-3">myHESPI</h1>
            <p class="text-muted">Nahraj fotografii herbářové listu a spusť synchronní zpracování HESPI.</p>
            <form action="/process" method="post" enctype="multipart/form-data">
              <div class="mb-3">
                <label for="image" class="form-label">Vstupní obrázek</label>
                <input class="form-control" id="image" name="image" type="file" accept=".jpg,.jpeg,.png,.tif,.tiff,.jp2" required>
              </div>
              <div class="small text-muted mb-3">
                Max velikost: {{ max_upload_mb }} MB. Povolené formáty: JPEG, PNG, TIFF, JP2.
              </div>
              <button type="submit" class="btn btn-primary">Zpracovat</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
