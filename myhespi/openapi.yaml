openapi: 3.0.3
info:
  title: myHESPI API
  version: "1.0.0"
  description: API for synchronous HESPI processing and DwC export.
servers:
  - url: /api/v1
paths:
  /openapi.yaml:
    get:
      summary: Get OpenAPI specification
      responses:
        "200":
          description: YAML specification
  /health:
    get:
      summary: Health check
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /jobs:
    post:
      summary: Process one image synchronously
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
            encoding:
              image:
                contentType: image/jpeg, image/png, image/tiff, image/jp2
      responses:
        "200":
          description: Job completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResult"
        "413":
          $ref: "#/components/responses/Error413"
        "415":
          $ref: "#/components/responses/Error415"
        "504":
          $ref: "#/components/responses/Error504"
  /jobs/{job_id}:
    get:
      summary: Get previously saved result
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResult"
        "404":
          $ref: "#/components/responses/Error404"
  /jobs/{job_id}/export/dwc.csv:
    get:
      summary: Download DwC CSV
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error404"
  /jobs/{job_id}/export/dwca.zip:
    get:
      summary: Download DwCA ZIP (optional)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        "404":
          $ref: "#/components/responses/Error404"
  /jobs/{job_id}/files/{filename}:
    get:
      summary: Download job image file
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
        - in: path
          name: filename
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Binary image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error404"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
  schemas:
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Segment:
      type: object
      properties:
        label:
          type: string
        text:
          type: string
        image_url:
          type: string
          nullable: true
    JobResult:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [completed]
        input_image_url:
          type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/Segment"
        dwc:
          type: object
          additionalProperties: true
        exports:
          type: object
          properties:
            dwc_csv_url:
              type: string
            dwca_zip_url:
              type: string
              nullable: true
  responses:
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Error413:
      description: File too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Error415:
      description: Unsupported media type
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Error504:
      description: Processing timeout
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
